{% extends "base.html" %}

{% block title %}{{ t('result.title') }}{% endblock %}

{% block content %}
<div id="page-wrap">
    <h1 id="result-heading">{{ t('result.heading') }} 🎯</h1>
    {% if guest_mode %}
    <p id="guest-mode-note" style="color: #ffeb3b; margin-bottom: 1rem;">🎮 {{ t('result.guest_mode') }}</p>
    {% endif %}
    <div class="upload-option-card" style="max-width: 640px; margin-top: 1rem;">
        <div id="game">
        <div id="quiz">
            <p id="live-score" class="score">{{ t('result.score', score=0) }}</p>
            <p id="question-text" dir="auto"></p>
            <div id="options-container" class="options"></div>
            <p id="feedback"></p>
            <p id="explanation" dir="auto"></p>
        </div>
        </div>
    </div>
</div>

<style>
    #page-wrap {
        margin-top: 0;
        padding-top: 0.25rem;
    }
    #page-wrap h1 {
        margin: 0.25rem 0 0.25rem 0;
        text-align: center;
    }
    #quiz {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0;
    }
    #question-text {
        background-color: #1f2937;
        color: #f9fafb;
        padding: 0.8rem 1.2rem;
        border-radius: 8px;
        max-width: 600px;
        width: 100%;
        text-align: center;
        font-size: 1.2rem;
        margin: 0;
        unicode-bidi: plaintext;
    }
    #options-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.2rem;
        width: 100%;
    }
    #options-container button {
        unicode-bidi: plaintext;
    }
    #feedback {
        max-width: 600px;
        unicode-bidi: isolate;
    }
    #explanation {
        background-color: #111827;
        color: #d1d5db;
        border-inline-start: 4px solid #6366f1;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        max-width: 600px;
        width: 100%;
        text-align: start;
        font-size: 0.95rem;
        line-height: 1.4;
        margin: 0;
        display: none;
        unicode-bidi: plaintext;
    }

</style>

<script>
    window.__preserveLangSwitch = true;
    let I18N = {{ i18n_js | tojson }};
    let trivia = {{ trivia | tojson | safe }};
    const gameId = {{ game_id | tojson }};
    const guestMode = {{ guest_mode | tojson }};
    const jobId = {{ job_id | tojson }};
    const total = {{ total | tojson }};
    let current = 0;
    let score = 0;
    let done = trivia.length >= total;
    let waiting = false;
    let pollTimer = null;
    let gameEnded = false;
    let noQuestions = false;

    function fmt(template, vars) {
        return template.replace(/\{(\w+)\}/g, (_, key) => vars[key] ?? "");
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    window.applyLanguage = function(data) {
        I18N = data.i18n_js;
        if (data.ui["result.title"]) {
            document.title = data.ui["result.title"];
        }
        const heading = document.getElementById("result-heading");
        if (heading && data.ui["result.heading"]) {
            heading.textContent = data.ui["result.heading"] + " 🎯";
        }
        const guestNote = document.getElementById("guest-mode-note");
        if (guestNote && data.ui["result.guest_mode"]) {
            guestNote.textContent = "🎮 " + data.ui["result.guest_mode"];
        }
        if (noQuestions) {
            renderNoQuestions();
            return;
        }
        if (gameEnded) {
            endGame();
            return;
        }
        if (document.getElementById("live-score")) {
            updateLiveScore();
        }
        if (waiting) {
            showWaiting();
        }
    };

    function showQuestion() {
        document.getElementById("feedback").innerText = "";
        const expEl = document.getElementById("explanation");
        expEl.innerText = "";
        expEl.style.display = "none";
        const q = trivia[current];
        document.getElementById("question-text").innerText = q.question;
        const optionsDiv = document.getElementById("options-container");
        optionsDiv.innerHTML = "";
        q.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.dir = "auto";
            btn.textContent = opt;
            btn.onclick = () => handleAnswer(opt);
            optionsDiv.appendChild(btn);
        });
    }

    const FEEDBACK_DELAY_CORRECT = 2000;
    const FEEDBACK_DELAY_WRONG = 2500;
    const EXPLANATION_EXTRA_DELAY_CORRECT = 2000;
    const EXPLANATION_EXTRA_DELAY_WRONG = 1200;

    function showFeedback(isCorrect, correctAnswer, explanation) {
        const feedbackEl = document.getElementById("feedback");
        if (isCorrect) {
            feedbackEl.textContent = "✅ " + I18N.result_correct;
        } else {
            feedbackEl.innerHTML = "❌ " + fmt(I18N.result_wrong, {
                answer: "<bdi>" + escapeHtml(correctAnswer) + "</bdi>",
            });
        }
        let delay = isCorrect ? FEEDBACK_DELAY_CORRECT : FEEDBACK_DELAY_WRONG;
        if (explanation) {
            const expEl = document.getElementById("explanation");
            expEl.textContent = "💡 " + explanation;
            expEl.style.display = "block";
            delay += isCorrect ? EXPLANATION_EXTRA_DELAY_CORRECT : EXPLANATION_EXTRA_DELAY_WRONG;
        }
        document.querySelectorAll("#options-container button").forEach(b => b.disabled = true);
        updateLiveScore();
        setTimeout(nextQuestion, delay);
    }

    async function handleAnswer(opt) {
        document.querySelectorAll("#options-container button").forEach(b => b.disabled = true);
        if (guestMode) {
            const q = trivia[current];
            const isCorrect = opt === q.answer;
            if (isCorrect) score++;
            showFeedback(isCorrect, q.answer, q.explanation);
            return;
        }
        try {
            const formData = new FormData();
            formData.append("game_id", gameId);
            formData.append("question_index", current);
            formData.append("choice", opt);
            const res = await fetch("/answer-question", { method: "POST", body: formData, credentials: "include" });
            if (res.status === 401) {
                alert(I18N.session_expired || "Your session expired. Please log in again.");
                window.location.href = "/login";
                return;
            }
            if (!res.ok) throw new Error("Request failed");
            const data = await res.json();
            score = data.score;
            showFeedback(data.correct, data.answer, data.explanation);
        } catch (err) {
            document.querySelectorAll("#options-container button").forEach(b => b.disabled = false);
            alert(I18N.error_request_failed || "Request failed.");
        }
    }

    function updateLiveScore() {
        document.getElementById("live-score").innerText = fmt(I18N.result_score, { score: score });
    }

    function nextQuestion() {
        current++;
        advance();
    }

    function advance() {
        if (current >= total || (done && current >= trivia.length)) {
            endGame();
            return;
        }
        if (current >= trivia.length) {
            waiting = true;
            showWaiting();
            return;
        }
        waiting = false;
        showQuestion();
    }

    function showWaiting() {
        document.getElementById("feedback").innerText = "";
        const expEl = document.getElementById("explanation");
        expEl.innerText = "";
        expEl.style.display = "none";
        document.getElementById("question-text").innerText = I18N.result_loading_more || "Loading more questions...";
        document.getElementById("options-container").innerHTML = "";
    }

    function endGame() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        gameEnded = true;
        const answered = trivia.length;
        const guestNote = guestMode
            ? `<p style="color: #ffeb3b; margin-top: 0.5rem;">${I18N.result_guest_not_saved}</p>`
            : "";
        const playAgainUrl = guestMode ? "/upload/guest" : "/upload";
        document.getElementById("game").innerHTML = `
        <h2>🎉 ${I18N.result_game_over}</h2>
        <p class="score">${fmt(I18N.result_your_score, { score: score, total: answered })}</p>
        ${guestNote}
        <div class="game-actions">
          <a href="${playAgainUrl}" class="btn btn-block">🔁 ${I18N.result_try_another}</a>
          <a href="/" class="btn btn-block">🏠 ${I18N.result_back_home}</a>
        </div>
      `;
    }

    function renderNoQuestions() {
        noQuestions = true;
        const backUrl = guestMode ? "/upload/guest" : "/upload";
        document.getElementById("game").innerHTML = `
        <p>${I18N.result_no_questions}</p>
        <a href="${backUrl}" class="btn">${I18N.result_back}</a>
      `;
    }

    function startPolling() {
        if (!jobId || done) return;
        pollTimer = setInterval(async () => {
            try {
                const res = await fetch(`/trivia-status/${jobId}`, { credentials: "include" });
                const data = await res.json();
                if (data.questions && data.questions.length > trivia.length) {
                    trivia = data.questions;
                }
                if (data.done) {
                    done = true;
                    clearInterval(pollTimer);
                    pollTimer = null;
                }
                if (waiting && (current < trivia.length || done)) {
                    advance();
                }
            } catch (e) {}
        }, 2000);
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!Array.isArray(trivia) || trivia.length === 0) {
            renderNoQuestions();
            return;
        }
        startPolling();
        advance();
    });
</script>
{% endblock %}
