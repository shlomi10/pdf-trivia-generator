{% extends "base.html" %}

{% block title %}{{ t('result.title') }}{% endblock %}

{% block content %}
<div id="page-wrap">
    <h1>{{ t('result.heading') }} 🎯</h1>
    {% if guest_mode %}
    <p style="color: #ffeb3b; margin-bottom: 1rem;">🎮 {{ t('result.guest_mode') }}</p>
    {% endif %}
    <div class="upload-option-card" style="max-width: 640px; margin-top: 1rem;">
        <div id="game">
        <div id="quiz">
            <p id="live-score" class="score">{{ t('result.score', score=0) }}</p>
            <p id="question-text"></p>
            <div id="options-container" class="options"></div>
            <p id="feedback"></p>
        </div>
        </div>
    </div>
</div>

<style>
    #page-wrap {
        margin-top: 0;
        padding-top: 0.25rem;
    }
    #page-wrap h1 {
        margin: 0.25rem 0 0.25rem 0;
        text-align: center;
    }
    #quiz {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0;
    }
    #question-text {
        background-color: #1f2937;
        color: #f9fafb;
        padding: 0.8rem 1.2rem;
        border-radius: 8px;
        max-width: 600px;
        width: 100%;
        text-align: center;
        font-size: 1.2rem;
        margin: 0;
    }
    #options-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.2rem;
        width: 100%;
    }

</style>

<script>
    const I18N = {{ i18n_js | tojson }};
    const fullTrivia = {{ trivia | tojson | safe }};
    const gameId = {{ game_id | tojson }};
    const guestMode = {{ guest_mode | tojson }};
    const trivia = fullTrivia;
    let current = 0;
    let score = 0;

    function fmt(template, vars) {
        return template.replace(/\{(\w+)\}/g, (_, key) => vars[key] ?? "");
    }

    function showQuestion() {
        document.getElementById("feedback").innerText = "";
        const q = trivia[current];
        document.getElementById("question-text").innerText = q.question;
        const optionsDiv = document.getElementById("options-container");
        optionsDiv.innerHTML = "";
        q.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.textContent = opt;
            btn.onclick = () => {
                const correct = opt === q.answer;
                if (correct) {
                    document.getElementById("feedback").innerText = "✅ " + I18N.result_correct;
                    score++;
                } else {
                    document.getElementById("feedback").innerText = "❌ " + fmt(I18N.result_wrong, { answer: q.answer });
                }
                document.querySelectorAll("#options-container button").forEach(b => b.disabled = true);
                updateLiveScore();
                setTimeout(nextQuestion, 1200);
            };
            optionsDiv.appendChild(btn);
        });
    }

    function updateLiveScore() {
        document.getElementById("live-score").innerText = fmt(I18N.result_score, { score: score });
    }

    async function nextQuestion() {
        current++;
        if (current < trivia.length) {
            showQuestion();
        } else {
            if (!guestMode) {
                await saveScore();
            }
            const guestNote = guestMode
                ? `<p style="color: #ffeb3b; margin-top: 0.5rem;">${I18N.result_guest_not_saved}</p>`
                : "";
            const playAgainUrl = guestMode ? "/upload/guest" : "/upload";
            document.getElementById("game").innerHTML = `
        <h2>🎉 ${I18N.result_game_over}</h2>
        <p class="score">${fmt(I18N.result_your_score, { score: score, total: trivia.length })}</p>
        ${guestNote}
        <div class="game-actions">
          <a href="${playAgainUrl}" class="btn btn-block">🔁 ${I18N.result_try_another}</a>
          <a href="/" class="btn btn-block">🏠 ${I18N.result_back_home}</a>
        </div>
      `;
        }
    }

    async function saveScore() {
        if (!gameId) return;
        try {
            const formData = new FormData();
            formData.append("game_id", gameId);
            formData.append("score", score);
            await fetch("/save-score", { method: "POST", body: formData, credentials: "include" });
        } catch (err) {}
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (!Array.isArray(trivia) || trivia.length === 0) {
            const backUrl = guestMode ? "/upload/guest" : "/upload";
            document.getElementById("game").innerHTML = `
        <p>${I18N.result_no_questions}</p>
        <a href="${backUrl}" class="btn">${I18N.result_back}</a>
      `;
            return;
        }
        showQuestion();
    });
</script>
{% endblock %}
