{% extends "base.html" %}

{% block title %}{{ t('home.title') }}{% endblock %}

{% block content %}
<section class="hero">
  <h1 class="hero-brand">
    <span>{{ t('home.brand') }}</span>
  </h1>
  <p class="hero-copy">{{ t('home.subtitle') }}</p>
  <div class="hero-actions">
    <button type="button" onclick="window.location.href='/upload'">{{ t('home.start') }} {% if lang == 'he' %}←{% else %}→{% endif %}</button>
  </div>
</section>
{% endblock %}
