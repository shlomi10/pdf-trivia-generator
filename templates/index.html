{% extends "base.html" %}

{% block title %}{{ t('home.title') }}{% endblock %}

{% block content %}
<div class="page-center">
  <div class="content-card">
    <h1 class="text-outline glow" style="font-size: 2.75rem; margin-bottom: 1rem;">
      {{ t('home.heading') }} <br/>
      <span style="color: #4ade80;">{{ t('home.brand') }}</span>
    </h1>

    <p class="text-outline" style="font-size: 1.25rem; max-width: 650px; margin: 0 auto;">
      {{ t('home.subtitle') }}
    </p>

    <p>
      <button type="button" onclick="window.location.href='/upload'">{{ t('home.start') }} →</button>
    </p>
  </div>
</div>
{% endblock %}
